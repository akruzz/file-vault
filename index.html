<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>File Vault — Local Encryption</title>
<meta name="description" content="Encrypt and decrypt files locally in your browser. Nothing ever leaves your device." />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="background-glow" aria-hidden="true"></div>

  <!-- Floating social dock -->
  <nav class="social-dock" aria-label="Social links">
    <a
      href="https://github.com/akruzz"
      target="_blank"
      rel="noopener noreferrer"
      class="dock-btn"
      data-tooltip="GitHub"
      aria-label="GitHub — opens in a new tab"
    >
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0.5C5.65 0.5 0.5 5.65 0.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55 0-.27-.01-1.16-.01-2.11-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.05-.71.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 015.79 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.59.23 2.76.12 3.05.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.41-5.26 5.69.41.36.78 1.06.78 2.14 0 1.54-.01 2.79-.01 3.17 0 .3.2.66.79.55A11.51 11.51 0 0023.5 12C23.5 5.65 18.35 0.5 12 0.5z"/>
      </svg>
      <span class="dock-tooltip" role="tooltip">GitHub</span>
    </a>

    <a
      href="https://www.instagram.com/artemkruzak/"
      target="_blank"
      rel="noopener noreferrer"
      class="dock-btn"
      data-tooltip="Instagram"
      aria-label="Instagram — opens in a new tab"
    >
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="12" cy="12" r="4.6" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="17.6" cy="6.4" r="1.15" fill="currentColor"/>
      </svg>
      <span class="dock-tooltip" role="tooltip">Instagram</span>
    </a>
  </nav>

  <main class="page">

    <header class="brand">
      <div class="brand-logo">
        <img src="icon.svg" alt="" class="brand-icon" />
        <h1>File Vault</h1>
      </div>
      <p class="brand-subtitle">
        Encrypt and decrypt files locally.<br />
        Nothing ever leaves your device.
      </p>
    </header>

    <section class="card" aria-label="File Vault application">

      <!-- Drop zone -->
      <div
        id="dropZone"
        class="drop-zone"
        tabindex="0"
        role="button"
        aria-label="Drop a file here, or press Enter to choose a file"
      >
        <input type="file" id="fileInput" class="file-input-hidden" aria-hidden="true" />

        <div id="dropZoneEmpty" class="drop-zone-content">
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="drop-title">Drop files here</p>
          <p class="drop-or">or</p>
          <button type="button" id="chooseFileBtn" class="btn btn-ghost">Choose File</button>
        </div>

        <div id="dropZoneFile" class="file-preview hidden">
          <div class="file-icon" id="filePreviewIcon">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 2h9l5 5v13a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              <path d="M15 2v5h5" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="file-meta">
            <p class="file-name" id="fileName">—</p>
            <p class="file-size" id="fileSize">—</p>
          </div>
          <button type="button" id="removeFileBtn" class="btn-icon" aria-label="Remove selected file">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Password field -->
      <div class="field">
        <label for="passwordInput" class="field-label">Password</label>
        <div class="password-wrap">
          <input
            type="password"
            id="passwordInput"
            class="password-input"
            placeholder="Enter a strong password"
            autocomplete="new-password"
            spellcheck="false"
          />
          <button type="button" id="togglePasswordBtn" class="btn-icon" aria-label="Show password" aria-pressed="false">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Progress -->
      <div id="progressWrap" class="progress-wrap hidden">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="progressLabel" class="progress-label">Working…</p>
      </div>

      <!-- Action buttons -->
      <div class="actions">
        <button type="button" id="encryptBtn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 10V7a4 4 0 118 0v3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Encrypt File
        </button>
        <button type="button" id="decryptBtn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 10V7a4 4 0 017.94-.6" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Decrypt File
        </button>
      </div>

    </section>

    <footer class="page-footer">
      <p>Everything happens locally in your browser.<br />Your files never leave your device.</p>
    </footer>

  </main>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
